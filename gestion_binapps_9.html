<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gestión Binapps</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #f8f9fb;
    --surface: #ffffff;
    --border: #e4e7ed;
    --border-light: #f0f2f5;
    --text: #1a1d23;
    --text-muted: #6b7280;
    --text-soft: #9ca3af;
    --blue: #2563eb;
    --blue-light: #eff6ff;
    --blue-border: #bfdbfe;
    --green: #16a34a;
    --green-light: #f0fdf4;
    --green-border: #bbf7d0;
    --red: #dc2626;
    --red-light: #fef2f2;
    --red-border: #fecaca;
    --amber: #d97706;
    --amber-light: #fffbeb;
    --amber-border: #fde68a;
    --purple: #7c3aed;
    --purple-light: #f5f3ff;
    --shadow: 0 1px 3px rgba(0,0,0,.06), 0 1px 2px rgba(0,0,0,.04);
    --shadow-md: 0 4px 12px rgba(0,0,0,.08);
    --radius: 10px;
    --radius-sm: 6px;
  }

  body {
    font-family: 'Inter', sans-serif;
    background: var(--bg);
    color: var(--text);
    font-size: 14px;
    line-height: 1.5;
    min-height: 100vh;
  }

  /* LAYOUT */
  .app { display: flex; min-height: 100vh; }

  .sidebar {
    width: 220px;
    background: var(--surface);
    border-right: 1px solid var(--border);
    padding: 24px 16px;
    display: flex;
    flex-direction: column;
    gap: 4px;
    flex-shrink: 0;
  }

  .logo {
    font-size: 15px;
    font-weight: 600;
    color: var(--text);
    padding: 8px 10px 20px;
    letter-spacing: -.3px;
  }
  .logo span { color: var(--blue); }

  .nav-btn {
    display: flex;
    align-items: center;
    gap: 9px;
    padding: 9px 10px;
    border-radius: var(--radius-sm);
    border: none;
    background: transparent;
    color: var(--text-muted);
    cursor: pointer;
    font-size: 13.5px;
    font-family: inherit;
    transition: all .15s;
    text-align: left;
    width: 100%;
  }
  .nav-btn:hover { background: var(--bg); color: var(--text); }
  .nav-btn.active { background: var(--blue-light); color: var(--blue); font-weight: 500; }
  .nav-btn svg { width: 16px; height: 16px; flex-shrink: 0; stroke-width: 1.8; }

  .nav-section {
    font-size: 11px;
    font-weight: 600;
    color: var(--text-soft);
    text-transform: uppercase;
    letter-spacing: .6px;
    padding: 16px 10px 6px;
  }

  .main { flex: 1; padding: 28px 32px; overflow-y: auto; min-width: 0; }

  .page { display: none; }
  .page.active { display: block; }

  /* HEADER */
  .page-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 24px;
  }
  .page-title { font-size: 20px; font-weight: 600; letter-spacing: -.4px; }
  .page-sub { font-size: 13px; color: var(--text-muted); margin-top: 2px; }

  /* CARDS */
  .kpi-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 12px; margin-bottom: 28px; }

  .kpi {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 18px 20px;
    box-shadow: var(--shadow);
  }
  .kpi-num { font-size: 28px; font-weight: 600; letter-spacing: -1px; line-height: 1; margin-bottom: 5px; }
  .kpi-lbl { font-size: 12px; color: var(--text-muted); }
  .kpi.blue .kpi-num { color: var(--blue); }
  .kpi.green .kpi-num { color: var(--green); }
  .kpi.red .kpi-num { color: var(--red); }
  .kpi.amber .kpi-num { color: var(--amber); }

  /* SECTION TITLES */
  .sec-title {
    font-size: 13px;
    font-weight: 600;
    color: var(--text);
    margin-bottom: 12px;
    padding-bottom: 10px;
    border-bottom: 1px solid var(--border-light);
  }

  /* PROGRESS */
  .progress-list { display: flex; flex-direction: column; gap: 10px; }
  .prog-item { }
  .prog-header { display: flex; justify-content: space-between; font-size: 12.5px; color: var(--text-muted); margin-bottom: 5px; }
  .prog-bar { height: 5px; background: var(--border); border-radius: 99px; overflow: hidden; }
  .prog-fill { height: 100%; background: var(--blue); border-radius: 99px; transition: width .4s ease; }
  .prog-fill.full { background: var(--green); }

  /* ACTIVITIES */
  .act-list { display: flex; flex-direction: column; gap: 6px; }

  .act-item {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 13px 16px;
    display: flex;
    align-items: flex-start;
    gap: 12px;
    box-shadow: var(--shadow);
    transition: border-color .15s;
  }
  .act-item:hover { border-color: var(--blue-border); }

  .act-check {
    width: 18px; height: 18px;
    border: 1.5px solid var(--border);
    border-radius: 5px;
    flex-shrink: 0;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    margin-top: 1px;
    transition: all .15s;
    background: var(--surface);
  }
  .act-check:hover { border-color: var(--blue); }
  .act-check.done { background: var(--green); border-color: var(--green); }
  .act-check.done::after { content: ''; width: 5px; height: 9px; border: 2px solid white; border-top: none; border-left: none; transform: rotate(45deg) translate(-1px,-1px); display: block; }

  .act-body { flex: 1; min-width: 0; }
  .act-desc { font-size: 13.5px; line-height: 1.45; }
  .act-desc.done { text-decoration: line-through; color: var(--text-soft); }
  .act-meta { font-size: 11.5px; color: var(--text-soft); margin-top: 4px; }
  .act-result { font-size: 11.5px; color: var(--text-muted); margin-top: 3px; }
  .act-result::before { content: '→ '; }

  .act-actions { display: flex; gap: 4px; align-items: flex-start; }
  .icon-btn {
    padding: 4px;
    border: none;
    background: transparent;
    cursor: pointer;
    color: var(--text-soft);
    border-radius: 4px;
    transition: all .15s;
    display: flex;
    align-items: center;
  }
  .icon-btn:hover { background: var(--red-light); color: var(--red); }
  .icon-btn svg { width: 14px; height: 14px; stroke-width: 1.8; }

  /* BADGES */
  .badge {
    display: inline-flex;
    align-items: center;
    font-size: 11px;
    font-weight: 500;
    padding: 2px 8px;
    border-radius: 99px;
    margin-top: 5px;
  }
  .badge-alta { background: var(--red-light); color: var(--red); }
  .badge-media { background: var(--amber-light); color: var(--amber); }
  .badge-lista { background: var(--green-light); color: var(--green); }
  .badge-normal { background: var(--bg); color: var(--text-muted); }
  .badge-proceso { background: var(--purple-light); color: var(--purple); }
  .badge-area {
    background: var(--blue-light);
    color: var(--blue);
    font-size: 11px;
    padding: 2px 7px;
    border-radius: 99px;
    font-weight: 500;
    margin-right: 4px;
  }

  /* FILTERS */
  .filters { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 16px; }
  .filter-chip {
    padding: 5px 12px;
    border: 1px solid var(--border);
    border-radius: 99px;
    font-size: 12px;
    cursor: pointer;
    background: var(--surface);
    color: var(--text-muted);
    transition: all .15s;
    font-family: inherit;
  }
  .filter-chip:hover { border-color: var(--blue-border); color: var(--blue); }
  .filter-chip.active { background: var(--blue); color: white; border-color: var(--blue); }

  /* FORM */
  .form-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 22px 24px;
    box-shadow: var(--shadow);
    margin-bottom: 20px;
  }
  .form-title { font-size: 15px; font-weight: 600; margin-bottom: 18px; }

  .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; margin-bottom: 14px; }
  .form-grid.full { grid-template-columns: 1fr; }

  .form-group label {
    display: block;
    font-size: 12px;
    font-weight: 500;
    color: var(--text-muted);
    margin-bottom: 5px;
  }
  .form-group input,
  .form-group select,
  .form-group textarea {
    width: 100%;
    padding: 9px 12px;
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    font-family: inherit;
    font-size: 13.5px;
    color: var(--text);
    background: var(--bg);
    outline: none;
    transition: border-color .15s;
  }
  .form-group input:focus,
  .form-group select:focus,
  .form-group textarea:focus { border-color: var(--blue); background: white; }
  .form-group textarea { resize: vertical; min-height: 80px; }

  .btn {
    padding: 9px 18px;
    border-radius: var(--radius-sm);
    font-family: inherit;
    font-size: 13.5px;
    font-weight: 500;
    cursor: pointer;
    border: none;
    transition: all .15s;
    display: inline-flex;
    align-items: center;
    gap: 6px;
  }
  .btn-primary { background: var(--blue); color: white; }
  .btn-primary:hover { background: #1d4ed8; }
  .btn-secondary { background: var(--bg); color: var(--text-muted); border: 1px solid var(--border); }
  .btn-secondary:hover { background: var(--border-light); }
  .btn svg { width: 15px; height: 15px; stroke-width: 2; }

  /* INFORME */
  .report-out {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 18px 20px;
    font-family: 'Courier New', monospace;
    font-size: 12.5px;
    line-height: 1.75;
    white-space: pre-wrap;
    max-height: 480px;
    overflow-y: auto;
    color: var(--text);
    margin-top: 14px;
  }

  /* GRID LAYOUT */
  .two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 20px;
    box-shadow: var(--shadow);
  }

  /* EMPTY */
  .empty { color: var(--text-soft); font-size: 13px; padding: 24px; text-align: center; }

  /* TOAST */
  .toast {
    position: fixed;
    bottom: 24px; right: 24px;
    background: var(--text);
    color: white;
    padding: 12px 18px;
    border-radius: var(--radius);
    font-size: 13px;
    font-weight: 500;
    box-shadow: var(--shadow-md);
    opacity: 0;
    transform: translateY(8px);
    transition: all .2s;
    z-index: 100;
    pointer-events: none;
  }
  .toast.show { opacity: 1; transform: translateY(0); }

  .area-edit-btn {
    opacity: 0;
    position: absolute;
    top: 10px; right: 10px;
    background: white;
    border: 1px solid var(--border);
    border-radius: 5px;
    padding: 3px 6px;
    cursor: pointer;
    font-size: 11px;
    color: var(--text-muted);
    transition: all .15s;
    display: flex; align-items: center; gap: 4px;
  }
  .area-card:hover .area-edit-btn { opacity: 1; }
  .area-card:hover .area-edit-btn:hover { background: var(--blue-light); color: var(--blue); border-color: var(--blue-border); }
  .area-name-input {
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: .5px;
    border: 1.5px solid var(--blue);
    border-radius: 4px;
    padding: 2px 6px;
    font-family: inherit;
    outline: none;
    width: 100%;
    background: white;
  }

  .area-group { margin-bottom: 22px; }
  .area-group-header {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 10px;
    padding-bottom: 8px;
    border-bottom: 2px solid var(--border);
  }
  .area-group-title {
    font-size: 13px;
    font-weight: 600;
    color: var(--text);
  }
  .area-group-count {
    font-size: 11px;
    background: var(--bg);
    border: 1px solid var(--border);
    color: var(--text-muted);
    padding: 1px 8px;
    border-radius: 99px;
    font-weight: 500;
  }
  .area-dot {
    width: 10px; height: 10px;
    border-radius: 50%;
    flex-shrink: 0;
  }

  .search-bar {
    display: flex;
    gap: 8px;
    margin-bottom: 14px;
    align-items: center;
  }
  .search-bar input {
    flex: 1;
    padding: 9px 14px;
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    font-family: inherit;
    font-size: 13.5px;
    background: var(--surface);
    outline: none;
    transition: border-color .15s;
  }
  .search-bar input:focus { border-color: var(--blue); }
  .search-count { font-size: 12px; color: var(--text-soft); white-space: nowrap; }

  /* EDIT MODAL */
  .modal-overlay {
    position: fixed; inset: 0;
    background: rgba(0,0,0,.35);
    display: flex; align-items: center; justify-content: center;
    z-index: 200;
    opacity: 0; pointer-events: none;
    transition: opacity .2s;
  }
  .modal-overlay.open { opacity: 1; pointer-events: all; }
  .modal {
    background: var(--surface);
    border-radius: var(--radius);
    padding: 24px 26px;
    width: min(560px, 95vw);
    box-shadow: var(--shadow-md);
    transform: translateY(12px);
    transition: transform .2s;
    max-height: 90vh;
    overflow-y: auto;
  }
  .modal-overlay.open .modal { transform: translateY(0); }
  .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 18px; }
  .modal-title { font-size: 15px; font-weight: 600; }
  .modal-close { background: none; border: none; cursor: pointer; color: var(--text-soft); font-size: 20px; line-height: 1; padding: 2px 6px; border-radius: 4px; }
  .modal-close:hover { background: var(--bg); color: var(--text); }

  @media (max-width: 700px) {
    .sidebar { display: none; }
    .main { padding: 16px; }
    .two-col { grid-template-columns: 1fr; }
    .form-grid { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>

<div class="app">

  <!-- SIDEBAR -->
  <aside class="sidebar">
    <div class="logo" style="display:flex;align-items:center;gap:10px;padding-bottom:20px">
  <img src="https://binapps.com/wp-content/uploads/2021/10/cropped-favicon_01-270x270.png" 
       alt="Binapps" 
       style="width:36px;height:36px;border-radius:8px;object-fit:contain"
       onerror="this.style.display='none';document.getElementById('logo-text').style.display='block'">
  <span id="logo-text" style="display:none;font-size:15px;font-weight:600;color:var(--text)">Binapps <span style="color:var(--blue)">·</span> Gestión</span>
  <div>
    <div style="font-size:14px;font-weight:600;color:var(--text);line-height:1.2">Binapps</div>
    <div style="font-size:11px;color:var(--text-soft)">Panel de gestión</div>
  </div>
</div>

    <button class="nav-btn active" onclick="goTo('dashboard')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
      Resumen
    </button>
    <button class="nav-btn" onclick="goTo('actividades')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 01-2 2H5a2 2 0 01-2-2V5a2 2 0 012-2h11"/></svg>
      Actividades
    </button>
    <button class="nav-btn" onclick="goTo('pendientes')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
      Pendientes
    </button>

    <div class="nav-section">Acciones</div>

    <button class="nav-btn" onclick="goTo('agregar')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="16"/><line x1="8" y1="12" x2="16" y2="12"/></svg>
      Agregar actividad
    </button>
    <button class="nav-btn" onclick="goTo('informe')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/></svg>
      Generar informe
    </button>
  </aside>

  <!-- MAIN -->
  <main class="main">

    <!-- DASHBOARD -->
    <div class="page active" id="page-dashboard">
      <div class="page-header">
        <div>
          <div class="page-title">Panel de gestión</div>
          <div class="page-sub" id="dash-fecha"></div>
        </div>
      </div>
      <div class="kpi-grid" id="kpi-grid"></div>
      <div class="two-col">
        <div class="card">
          <div class="sec-title">Progreso por área</div>
          <div class="progress-list" id="progress-list"></div>
        </div>
        <div class="card">
          <div class="sec-title">Últimas actividades</div>
          <div class="act-list" id="recent-list"></div>
        </div>
      </div>
    </div>

    <!-- ACTIVIDADES -->
    <div class="page" id="page-actividades">
      <div class="page-header">
        <div>
          <div class="page-title">Todas las actividades</div>
          <div class="page-sub" id="acts-count"></div>
        </div>
      </div>
      <div class="search-bar">
        <input type="text" id="search-input" placeholder="Buscar actividad..." oninput="renderActs()">
        <span class="search-count" id="search-count"></span>
      </div>
      <div class="filters" id="area-filters"></div>
      <div class="act-list" id="all-acts"></div>
    </div>

    <!-- PENDIENTES -->
    <div class="page" id="page-pendientes">

      <!-- VISTA RESUMEN: tarjetas por área -->
      <div id="pend-overview">
        <div class="page-header">
          <div>
            <div class="page-title">Pendientes por área</div>
            <div class="page-sub" id="pend-total-sub"></div>
          </div>
        </div>
        <div id="pend-area-cards" style="display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:14px"></div>
      </div>

      <!-- VISTA DETALLE: pendientes de un área -->
      <div id="pend-detail" style="display:none">
        <div class="page-header">
          <div style="display:flex;align-items:center;gap:12px">
            <button onclick="backToOverview()" style="background:var(--bg);border:1px solid var(--border);border-radius:var(--radius-sm);padding:7px 12px;cursor:pointer;font-size:13px;color:var(--text-muted);display:flex;align-items:center;gap:6px;font-family:inherit">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" style="width:14px;height:14px;stroke-width:2"><polyline points="15 18 9 12 15 6"/></svg>
              Volver
            </button>
            <div>
              <div class="page-title" id="pend-detail-title"></div>
              <div class="page-sub" id="pend-detail-sub"></div>
            </div>
          </div>
        </div>
        <div class="act-list" id="pend-detail-list"></div>
      </div>

    </div>

    <!-- AGREGAR -->
    <div class="page" id="page-agregar">
      <div class="page-header">
        <div class="page-title">Agregar actividad</div>
      </div>
      <div class="form-card">
        <div class="form-title">Nueva actividad</div>
        <div class="form-grid">
          <div class="form-group">
            <label>Área</label>
            <select id="f-area">
              <option>Área de soporte / Zoho</option>
              <option>Plan de cuentas / Contabilidad</option>
              <option>Modelo Excel / Análisis</option>
              <option>Power BI</option>
              <option>Azure</option>
              <option>Hetzner</option>
              <option>TD Synnex</option>
              <option>Comercial</option>
              <option>General</option>
            </select>
          </div>
          <div class="form-group">
            <label>Fecha</label>
            <input type="date" id="f-fecha">
          </div>
        </div>
        <div class="form-grid full">
          <div class="form-group">
            <label>Descripción de la actividad</label>
            <textarea id="f-desc" placeholder="¿Qué se hizo? ¿Cuál fue el contexto?"></textarea>
          </div>
        </div>
        <div class="form-grid">
          <div class="form-group">
            <label>Resultado / métrica</label>
            <input type="text" id="f-res" placeholder="ej. configurado, aprobado, corregido...">
          </div>
          <div class="form-group">
            <label>Estado</label>
            <select id="f-est">
              <option>Pendiente</option>
              <option>En proceso</option>
              <option>Completado</option>
            </select>
          </div>
        </div>
        <div class="form-grid">
          <div class="form-group">
            <label>Prioridad (si es pendiente)</label>
            <select id="f-pri">
              <option>Alta</option>
              <option>Media</option>
              <option value="Lista">Lista para ejecutar</option>
              <option>Normal</option>
            </select>
          </div>
          <div class="form-group">
            <label>Herramienta / responsable</label>
            <input type="text" id="f-her" placeholder="ej. Zoho Desk, Edwin, BNET ERP...">
          </div>
        </div>

let AREAS = ['Área de soporte / Zoho','Plan de cuentas / Contabilidad','Modelo Excel / Análisis','Power BI','Azure','Hetzner','TD Synnex','Comercial','Valoración Empresa','General'];
const STORE_KEY = 'binapps_gestion_v1';

let acts = [], nextId = 1, filterArea = 'todas';

function load() {
  try {
    const s = localStorage.getItem(STORE_KEY);
    if(s) { const d = JSON.parse(s); acts = d.acts || []; nextId = d.nextId || 1; }
    else { acts = SEED.map(a=>({...a})); nextId = 83; save(); }
  } catch(e) { acts = SEED.map(a=>({...a})); nextId = 62; }
}

function save() {
  try { localStorage.setItem(STORE_KEY, JSON.stringify({acts, nextId})); } catch(e){}
}

function toast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'), 2200);
}

function goTo(tab) {
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('page-'+tab).classList.add('active');
  document.querySelectorAll('.nav-btn')[['dashboard','actividades','pendientes','X','agregar','informe'].indexOf(tab)] && 
    document.querySelectorAll('.nav-btn')[['dashboard','actividades','pendientes','agregar','informe'].indexOf(tab)].classList.add('active');
  document.querySelectorAll('.nav-btn').forEach(b=>{ if(b.textContent.trim().toLowerCase().includes(tab.replace('page-',''))) b.classList.add('active'); });
  if(tab==='dashboard') renderDash();
  if(tab==='actividades') renderActs();
  if(tab==='pendientes') renderPend();
}

function bc(p){return p==='Alta'?'badge-alta':p==='Media'?'badge-media':p==='Lista'?'badge-lista':'badge-normal';}
function bl(p){return p==='Alta'?'🔴 Alta':p==='Media'?'🟠 Media':p==='Lista'?'✅ Lista':'🟡 Normal';}

function renderDash() {
  document.getElementById('dash-fecha').textContent = new Date().toLocaleDateString('es-CO',{weekday:'long',day:'numeric',month:'long',year:'numeric'});
  const total=acts.length, comp=acts.filter(a=>a.estado==='Completado').length;
  const pend=acts.filter(a=>a.estado==='Pendiente').length;
  const altas=acts.filter(a=>a.estado==='Pendiente'&&a.prioridad==='Alta').length;
  document.getElementById('kpi-grid').innerHTML=`
    <div class="kpi blue"><div class="kpi-num">${total}</div><div class="kpi-lbl">Actividades totales</div></div>
    <div class="kpi green"><div class="kpi-num">${comp}</div><div class="kpi-lbl">Completadas</div></div>
    <div class="kpi amber"><div class="kpi-num">${pend}</div><div class="kpi-lbl">Pendientes</div></div>
    <div class="kpi red"><div class="kpi-num">${altas}</div><div class="kpi-lbl">Prioridad alta</div></div>`;
  document.getElementById('progress-list').innerHTML=AREAS.map(area=>{
    const ta=acts.filter(a=>a.area===area).length;
    const da=acts.filter(a=>a.area===area&&a.estado==='Completado').length;
    if(!ta) return '';
    const pct=Math.round(da/ta*100);
    return`<div class="prog-item"><div class="prog-header"><span>${area}</span><span>${da}/${ta}</span></div><div class="prog-bar"><div class="prog-fill ${pct===100?'full':''}" style="width:${pct}%"></div></div></div>`;
  }).join('');
  const recent=[...acts].sort((a,b)=>b.id-a.id).slice(0,6);
  document.getElementById('recent-list').innerHTML=recent.map(a=>`
    <div style="padding:10px 0;border-bottom:1px solid var(--border-light);display:flex;gap:10px;align-items:flex-start">
      <div style="width:8px;height:8px;border-radius:50%;flex-shrink:0;margin-top:5px;background:${a.estado==='Completado'?'var(--green)':'var(--amber)'}"></div>
      <div><div style="font-size:12.5px;line-height:1.4">${a.desc.substring(0,75)}${a.desc.length>75?'…':''}</div>
      <div style="font-size:11px;color:var(--text-soft);margin-top:3px">${a.area} · ${a.fecha}</div></div>
    </div>`).join('');
}

function actHTML(a, showDel=true) {
  const badges = a.estado==='Pendiente'?`<span class="badge ${bc(a.prioridad)}">${bl(a.prioridad)}</span>`:
                 a.estado==='En proceso'?`<span class="badge badge-proceso">⚡ En proceso</span>`:'';
  return `<div class="act-item" id="act-${a.id}">
    <div class="act-check ${a.estado==='Completado'?'done':''}" onclick="toggle(${a.id})"></div>
    <div class="act-body">
      <div class="act-desc ${a.estado==='Completado'?'done':''}">${a.desc}</div>
      <div class="act-meta"><span class="badge-area">${a.area}</span>${a.fecha}${a.herramienta?' · '+a.herramienta:''}</div>
      ${a.resultado?`<div class="act-result">${a.resultado}</div>`:''}
      ${badges}
    </div>
    <div class="act-actions">
    <button class="icon-btn" onclick="openEdit(${a.id})" title="Editar" style="color:var(--text-soft)"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" style="width:14px;height:14px;stroke-width:1.8"><path d="M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 013 3L12 15l-4 1 1-4 9.5-9.5z"/></svg></button>
    ${showDel?`<button class="icon-btn" onclick="del(${a.id})" title="Eliminar"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" style="width:14px;height:14px;stroke-width:1.8"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 01-2 2H8a2 2 0 01-2-2L5 6"/><path d="M10 11v6M14 11v6"/><path d="M9 6V4h6v2"/></svg></button>`:''}
  </div>
  </div>`;
}

function renderActs() {
  const q = (document.getElementById('search-input')?.value||'').toLowerCase().trim();
  let list = filterArea==='todas' ? acts : acts.filter(a=>a.area===filterArea);
  if(q) list = list.filter(a=>a.desc.toLowerCase().includes(q)||(a.resultado||'').toLowerCase().includes(q)||(a.herramienta||'').toLowerCase().includes(q));
  document.getElementById('acts-count').textContent = `${list.length} actividades`;
  const sc = document.getElementById('search-count');
  if(sc) sc.textContent = q ? `${list.length} resultado${list.length!==1?'s':''}` : '';
  document.getElementById('area-filters').innerHTML=
    ['todas',...AREAS].map(a=>`<button class="filter-chip ${filterArea===a?'active':''}" onclick="setF('${a}')">${a==='todas'?'Todas':a}</button>`).join('');
  document.getElementById('all-acts').innerHTML = list.length
    ? list.map(a=>actHTML(a)).join('')
    : `<div class="empty">${q?'Sin resultados para "'+q+'"':'Sin actividades en esta área'}</div>`;
}

const AREA_COLORS = {
  'Área de soporte / Zoho': '#2563eb',
  'Plan de cuentas / Contabilidad': '#16a34a',
  'Modelo Excel / Análisis': '#059669',
  'Power BI': '#7c3aed',
  'Azure': '#0284c7',
  'Hetzner': '#dc2626',
  'TD Synnex': '#d97706',
  'Comercial': '#db2777',
  'Valoración Empresa': '#0e7490',
  'General': '#6b7280',
};

function renderPend() {
  const pend = acts.filter(a=>a.estado!=='Completado');
  const total = pend.length;
  const altas = pend.filter(a=>a.prioridad==='Alta').length;
  document.getElementById('pend-total-sub').textContent =
    `${total} pendiente${total!==1?'s':''} en total · ${altas} de prioridad alta`;

  const priOrd = ['Alta','Media','Lista','Normal',''];
  const areasWithPend = AREAS.filter(area=>pend.some(a=>a.area===area));
  const container = document.getElementById('pend-area-cards');

  if(!total){ container.innerHTML = '<div class="empty" style="grid-column:1/-1">🎉 Sin pendientes — todo al día</div>'; return; }

  container.innerHTML = areasWithPend.map(area=>{
    const items = pend.filter(a=>a.area===area);
    const color = AREA_COLORS[area] || '#6b7280';
    const altasC = items.filter(a=>a.prioridad==='Alta').length;
    const mediaC = items.filter(a=>a.prioridad==='Media').length;
    const procesoC = items.filter(a=>a.estado==='En proceso').length;
    return `<div class="area-card" style="background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:18px 20px;box-shadow:var(--shadow);transition:all .15s;border-left:4px solid ${color};position:relative"
  onmouseover="this.style.transform='translateY(-2px)';this.style.boxShadow='var(--shadow-md)'"
  onmouseout="this.style.transform='';this.style.boxShadow='var(--shadow)'">
  <button class="area-edit-btn" onclick="event.stopPropagation();startRenameArea('${area.replace(/'/g,"\'")}',this)" title="Renombrar área">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" style="width:11px;height:11px;stroke-width:2"><path d="M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 013 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
    Renombrar
  </button>
  <div id="area-label-${area.replace(/[^a-zA-Z0-9]/g,'_')}" onclick="drillArea('${area.replace(/'/g,"\'")}')
" style="cursor:pointer">
    <div style="font-size:11px;font-weight:600;color:${color};text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px">${area}</div>
    <div style="font-size:32px;font-weight:600;color:var(--text);line-height:1;margin-bottom:10px">${items.length}</div>
    <div style="font-size:11.5px;color:var(--text-soft)">pendiente${items.length!==1?'s':''}</div>
    <div style="display:flex;gap:6px;margin-top:10px;flex-wrap:wrap">
      ${altasC>0?`<span style="background:var(--red-light);color:var(--red);font-size:11px;padding:2px 7px;border-radius:99px;font-weight:500">🔴 ${altasC} alta${altasC!==1?'s':''}</span>`:''}
      ${mediaC>0?`<span style="background:var(--amber-light);color:var(--amber);font-size:11px;padding:2px 7px;border-radius:99px;font-weight:500">🟠 ${mediaC} media${mediaC!==1?'s':''}</span>`:''}
      ${procesoC>0?`<span style="background:var(--purple-light);color:var(--purple);font-size:11px;padding:2px 7px;border-radius:99px;font-weight:500">⚡ ${procesoC} en proceso</span>`:''}
    </div>
  </div>
</div>`;
  }).join('');
}

function drillArea(area) {
  const pend = acts.filter(a=>a.estado!=='Completado'&&a.area===area);
  const priOrd = ['Alta','Media','Lista','Normal',''];
  pend.sort((a,b)=>priOrd.indexOf(a.prioridad)-priOrd.indexOf(b.prioridad));
  document.getElementById('pend-detail-title').textContent = area;
  document.getElementById('pend-detail-sub').textContent =
    `${pend.length} pendiente${pend.length!==1?'s':''}`;
  document.getElementById('pend-detail-list').innerHTML =
    pend.length ? pend.map(a=>actHTML(a,true)).join('') : '<div class="empty">Sin pendientes en esta área</div>';
  document.getElementById('pend-overview').style.display = 'none';
  document.getElementById('pend-detail').style.display = 'block';
}

function startRenameArea(area, btn) {
  const safeId = area.replace(/[^a-zA-Z0-9]/g,'_');
  const labelDiv = document.getElementById('area-label-'+safeId);
  if(!labelDiv) return;
  const card = btn.closest('.area-card');
  const color = card.style.borderLeftColor || '#2563eb';

  // Replace label with input
  const currentName = area;
  labelDiv.innerHTML = `
    <div style="font-size:11px;font-weight:600;color:${color};text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px">Nuevo nombre</div>
    <input class="area-name-input" id="rename-input-${safeId}" value="${currentName}"
      onclick="event.stopPropagation()"
      onkeydown="if(event.key==='Enter')confirmRename('${area.replace(/'/g,"\'")}',this.value);if(event.key==='Escape')renderPend()">
    <div style="display:flex;gap:6px;margin-top:10px">
      <button onclick="event.stopPropagation();confirmRename('${area.replace(/'/g,"\'")}',document.getElementById('rename-input-${safeId}').value)"
        style="background:var(--blue);color:white;border:none;border-radius:5px;padding:5px 12px;font-size:12px;cursor:pointer;font-family:inherit">
        Guardar
      </button>
      <button onclick="event.stopPropagation();renderPend()"
        style="background:var(--bg);border:1px solid var(--border);border-radius:5px;padding:5px 10px;font-size:12px;cursor:pointer;font-family:inherit;color:var(--text-muted)">
        Cancelar
      </button>
    </div>`;
  btn.style.display = 'none';
  setTimeout(()=>document.getElementById('rename-input-'+safeId)?.focus(),50);
}

function confirmRename(oldName, newName) {
  newName = newName.trim();
  if(!newName || newName === oldName) { renderPend(); return; }

  // Update AREAS array
  const idx = AREAS.indexOf(oldName);
  if(idx !== -1) AREAS[idx] = newName;

  // Update all activities with this area
  acts.forEach(a=>{ if(a.area===oldName) a.area=newName; });

  // Update AREA_COLORS
  if(AREA_COLORS[oldName]) { AREA_COLORS[newName] = AREA_COLORS[oldName]; delete AREA_COLORS[oldName]; }

  // Save and re-render
  save();
  toast(`✅ "${oldName}" renombrada a "${newName}"`);
  renderPend();
  // Update selects in forms
  updateAreaSelects();
}

function updateAreaSelects() {
  ['f-area','e-area','inf-area'].forEach(id=>{
    const sel = document.getElementById(id);
    if(!sel) return;
    const current = sel.value;
    // Rebuild options
    const isInf = id==='inf-area';
    sel.innerHTML = (isInf?'<option value="">Todas las áreas</option>':'')+
      AREAS.map(a=>`<option${a===current?' selected':''}>${a}</option>`).join('');
  });
}

function backToOverview() {
  document.getElementById('pend-detail').style.display = 'none';
  document.getElementById('pend-overview').style.display = 'block';
  renderPend();
}

function setF(a) { filterArea=a; renderActs(); }

function toggle(id) {
  const a=acts.find(x=>x.id===id); if(!a)return;
  a.estado = a.estado==='Completado'?'Pendiente':'Completado';
  if(a.estado==='Completado'){ a.prioridad=''; toast('✅ Marcado como completado'); }
  save();
  const active = document.querySelector('.page.active').id;
  if(active==='page-actividades') renderActs();
  if(active==='page-pendientes') renderPend();
  if(active==='page-dashboard') renderDash();
}

function del(id) {
  if(!confirm('¿Eliminar esta actividad?')) return;
  acts = acts.filter(a=>a.id!==id);
  save(); renderActs(); toast('Actividad eliminada');
}

function addAct() {
  const desc = document.getElementById('f-desc').value.trim();
  if(!desc){ alert('Escribe la descripción de la actividad.'); return; }
  const est = document.getElementById('f-est').value;
  acts.push({
    id: nextId++,
    area: document.getElementById('f-area').value,
    fecha: document.getElementById('f-fecha').value || new Date().toISOString().slice(0,10),
    desc,
    resultado: document.getElementById('f-res').value.trim(),
    estado: est,
    prioridad: est==='Pendiente' ? document.getElementById('f-pri').value : '',
    herramienta: document.getElementById('f-her').value.trim()
  });
  save(); clearForm(); toast('✅ Actividad guardada');
  goTo('actividades');
}

function clearForm() {
  ['f-desc','f-res','f-her'].forEach(id=>document.getElementById(id).value='');
  document.getElementById('f-fecha').value = new Date().toISOString().slice(0,10);
  document.getElementById('f-est').value = 'Pendiente';
}

function genReport() {
  const per=document.getElementById('inf-per').value;
  const aut=document.getElementById('inf-aut').value;
  const af=document.getElementById('inf-area').value;
  const ic=document.getElementById('inc-c').checked, ip=document.getElementById('inc-p').checked;
  let fl = af ? acts.filter(a=>a.area===af) : acts;
  const comp=fl.filter(a=>a.estado==='Completado'), pend=fl.filter(a=>a.estado!=='Completado');
  let out=`══════════════════════════════════════════════════
BINAPPS S.A.S — INFORME DE GESTIÓN
Período: ${per}
Preparado por: ${aut}
Fecha de generación: ${new Date().toLocaleDateString('es-CO',{day:'2-digit',month:'long',year:'numeric'})}
${af?'Área: '+af:'Todas las áreas'}
══════════════════════════════════════════════════

RESUMEN EJECUTIVO
Total de actividades: ${fl.length}
Completadas: ${comp.length} (${fl.length?Math.round(comp.length/fl.length*100):0}% de ejecución)
Pendientes: ${pend.length}

`;
  if(ic&&comp.length){
    const us=[...new Set(comp.map(a=>a.area))];
    out+=`ACTIVIDADES REALIZADAS\n${'─'.repeat(54)}\n`;
    us.forEach(area=>{
      const acs=comp.filter(a=>a.area===area);
      out+=`\n${area.toUpperCase()} (${acs.length} actividades)\n`;
      acs.forEach((a,i)=>{ out+=`  ${i+1}. ${a.desc}\n`; if(a.resultado) out+=`     → ${a.resultado}\n`; });
    });
    out+='\n';
  }
  if(ip&&pend.length){
    out+=`PENDIENTES Y PRÓXIMOS PASOS\n${'─'.repeat(54)}\n`;
    pend.sort((a,b)=>['Alta','Media','Lista','Normal',''].indexOf(a.prioridad)-['Alta','Media','Lista','Normal',''].indexOf(b.prioridad));
    pend.forEach((a,i)=>{
      const lbl=a.estado==='En proceso'?'[⚡ EN PROCESO]':a.prioridad==='Alta'?'[🔴 ALTA]':a.prioridad==='Media'?'[🟠 MEDIA]':a.prioridad==='Lista'?'[✅ LISTA]':'[🟡 NORMAL]';
      out+=`  ${i+1}. ${lbl} ${a.desc}\n     ${a.area}${a.herramienta?' | '+a.herramienta:''}\n`;
    });
  }
  out+=`\n══════════════════════════════════════════════════\nBINAPPS S.A.S — Documento de uso interno`;
  const el = document.getElementById('report-out');
  el.textContent = out; el.style.display='block';
}

function copyReport() {
  const t = document.getElementById('report-out').textContent;
  if(!t){ alert('Primero genera el informe.'); return; }
  navigator.clipboard.writeText(t).then(()=>toast('✅ Informe copiado al portapapeles'));
}

function openEdit(id) {
  const a = acts.find(x=>x.id===id); if(!a) return;
  document.getElementById('e-id').value = a.id;
  document.getElementById('e-area').value = a.area;
  document.getElementById('e-fecha').value = a.fecha;
  document.getElementById('e-desc').value = a.desc;
  document.getElementById('e-res').value = a.resultado||'';
  document.getElementById('e-est').value = a.estado;
  document.getElementById('e-pri').value = a.prioridad||'Normal';
  document.getElementById('e-her').value = a.herramienta||'';
  document.getElementById('edit-modal').classList.add('open');
}
function closeModal(e) { if(e.target===document.getElementById('edit-modal')) closeModalDirect(); }
function closeModalDirect() { document.getElementById('edit-modal').classList.remove('open'); }
function saveEdit() {
  const id = parseInt(document.getElementById('e-id').value);
  const a = acts.find(x=>x.id===id); if(!a) return;
  a.area = document.getElementById('e-area').value;
  a.fecha = document.getElementById('e-fecha').value;
  a.desc = document.getElementById('e-desc').value.trim();
  a.resultado = document.getElementById('e-res').value.trim();
  a.estado = document.getElementById('e-est').value;
  a.prioridad = a.estado==='Pendiente' ? document.getElementById('e-pri').value : '';
  a.herramienta = document.getElementById('e-her').value.trim();
  save(); closeModalDirect(); toast('✅ Actividad actualizada');
  const active = document.querySelector('.page.active').id;
  if(active==='page-actividades') renderActs();
  if(active==='page-pendientes') renderPend();
  if(active==='page-dashboard') renderDash();
}

// INIT
load();
document.getElementById('f-fecha').value = new Date().toISOString().slice(0,10);
// Fix nav active state
document.querySelectorAll('.nav-btn').forEach((b,i)=>{
  const tabs=['dashboard','actividades','pendientes','agregar','informe'];
  b.addEventListener('click',()=>{ document.querySelectorAll('.nav-btn').forEach(x=>x.classList.remove('active')); b.classList.add('active'); });
});
renderDash();
</script>
